# Apache Virtual Host Configuration for Moi Application
# File: /etc/apache2/sites-available/npdinfotech.conf

# ============================================================
# HTTP to HTTPS Redirect
# ============================================================
<VirtualHost *:80>
    ServerName npdinfotech.info
    ServerAlias www.npdinfotech.info
    
    # Redirect all HTTP to HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

# ============================================================
# HTTPS Configuration
# ============================================================
<VirtualHost *:443>
    ServerName npdinfotech.info
    ServerAlias www.npdinfotech.info
    ServerAdmin admin@npdinfotech.info
    
    # Document Root for Frontend
    DocumentRoot /var/www/html/moi_appliation/frontend/dist
    
    # ============================================================
    # SSL Configuration (Let's Encrypt)
    # ============================================================
    SSLEngine on
    SSLProtocol all -SSLv2 -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite HIGH:!aNULL:!MD5
    
    # Update these paths after running certbot
    SSLCertificateFile /etc/letsencrypt/live/npdinfotech.info/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/npdinfotech.info/privkey.pem
    
    # If using existing certificate, update these:
    # SSLCertificateFile /path/to/certificate.crt
    # SSLCertificateKeyFile /path/to/private.key
    # SSLCertificateChainFile /path/to/chain.crt
    
    # ============================================================
    # Headers & Security
    # ============================================================
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    
    # ============================================================
    # Compression
    # ============================================================
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css
        AddOutputFilterByType DEFLATE application/javascript application/json
        AddOutputFilterByType DEFLATE application/xml+rss application/rss+xml
    </IfModule>
    
    # ============================================================
    # Caching
    # ============================================================
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType text/html "access plus 0 seconds"
        ExpiresByType text/css "access plus 1 month"
        ExpiresByType application/javascript "access plus 1 month"
        ExpiresByType image/jpeg "access plus 1 year"
        ExpiresByType image/gif "access plus 1 year"
        ExpiresByType image/png "access plus 1 year"
        ExpiresByType image/svg+xml "access plus 1 year"
        ExpiresByType application/json "access plus 0 seconds"
    </IfModule>
    
    # ============================================================
    # Proxy Backend API Requests
    # ============================================================
    <IfModule mod_proxy.c>
        ProxyPreserveHost On
        ProxyRequests Off
        
        # API routes to backend
        ProxyPass /api http://127.0.0.1:5000/api nocanon
        ProxyPassReverse /api http://127.0.0.1:5000/api
        
        # Uploads directory (also proxied if needed)
        ProxyPass /uploads http://127.0.0.1:5000/uploads nocanon
        ProxyPassReverse /uploads http://127.0.0.1:5000/uploads
    </IfModule>
    
    # ============================================================
    # Frontend (React Router Support)
    # ============================================================
    RewriteEngine On
    
    # Enable mod_rewrite
    <Directory /var/www/html/moi_appliation/frontend/dist>
        Options -MultiViews +FollowSymLinks
        RewriteEngine On
        
        # Don't rewrite files or directories that exist
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        
        # Rewrite everything else to index.html
        RewriteRule ^ index.html [QSA,L]
        
        # Allow all access
        Allow from all
    </Directory>
    
    # ============================================================
    # Static Files (Performance)
    # ============================================================
    <Directory /var/www/html/moi_appliation/frontend/dist>
        # Disable directory listing
        Options -Indexes
        
        # Allow .htaccess overrides
        AllowOverride All
        
        # Allow access
        Require all granted
    </Directory>
    
    # ============================================================
    # Uploads Directory
    # ============================================================
    <Directory /var/www/html/moi_appliation/backend/uploads>
        Options -Indexes +FollowSymLinks
        Allow from all
        Require all granted
    </Directory>
    
    # ============================================================
    # Logging
    # ============================================================
    CustomLog ${APACHE_LOG_DIR}/moi-access.log combined
    ErrorLog ${APACHE_LOG_DIR}/moi-error.log
    
    # Log only errors
    LogLevel warn
</VirtualHost>

# ============================================================
# Enable Required Modules
# ============================================================
# Run these commands to enable required modules:
# a2enmod rewrite
# a2enmod proxy
# a2enmod proxy_http
# a2enmod ssl
# a2enmod headers
# a2enmod deflate
# a2enmod expires
# a2ensite npdinfotech
# systemctl restart apache2

# ============================================================
# Installation Steps:
# ============================================================
# 1. Create certificate (if using Let's Encrypt):
#    certbot certonly --apache -d npdinfotech.info -d www.npdinfotech.info
#
# 2. Copy this file to Apache sites:
#    cp apache-config.conf /etc/apache2/sites-available/npdinfotech.conf
#
# 3. Enable the site:
#    a2ensite npdinfotech
#
# 4. Enable required modules (see above)
#
# 5. Test configuration:
#    apache2ctl configtest
#
# 6. Restart Apache:
#    systemctl restart apache2
#
# 7. Verify:
#    systemctl status apache2
#    tail -f /var/log/apache2/moi-error.log
